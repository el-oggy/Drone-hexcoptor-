<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Drone IMU Ground Station</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
body{margin:0;background:#0a0f1c;color:#fff;font-family:Segoe UI;overflow:hidden}
#left{position:absolute;left:10px;top:10px;width:280px;background:rgba(15,20,35,.9);padding:12px;border-radius:12px}
#left h2{margin:0 0 10px 0}
.val{margin:6px 0}
button{padding:8px 12px;border-radius:8px}
#hud2{position:absolute;right:10px;top:10px;background:rgba(15,20,35,.9);padding:12px;border-radius:12px}
</style>
</head>
<body>
<div id="left">
<h2>Flight Controller Monitor</h2>
<button id="connect">Connect</button>
<div class="val">Roll: <span id="roll">0</span>°</div>
<div class="val">Pitch: <span id="pitch">0</span>°</div>
<div class="val">Yaw: <span id="yaw">0</span>°</div>
<hr>
<div class="val">AX: <span id="ax">0</span></div>
<div class="val">AY: <span id="ay">0</span></div>
<div class="val">AZ: <span id="az">0</span></div>
<hr>
<div class="val">GX: <span id="gx">0</span></div>
<div class="val">GY: <span id="gy">0</span></div>
<div class="val">GZ: <span id="gz">0</span></div>
</div>

<div id="hud2">
<div>X Axis = Roll (Red)</div>
<div>Y Axis = Pitch (Green)</div>
<div>Z Axis = Yaw (Blue)</div>
</div>

<script>
let port,reader;
let tr=0,tp=0,ty=0;
let cr=0,cp=0,cy=0;

const scene=new THREE.Scene();
const camera=new THREE.PerspectiveCamera(60,window.innerWidth/window.innerHeight,0.1,1000);
camera.position.set(6,5,8);

const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth,window.innerHeight);
document.body.appendChild(renderer.domElement);

scene.add(new THREE.AmbientLight(0xffffff,0.9));
const dl=new THREE.DirectionalLight(0xffffff,1);
dl.position.set(10,10,10);
scene.add(dl);

scene.add(new THREE.GridHelper(20,20));

const drone=new THREE.Group();
scene.add(drone);

const body=new THREE.Mesh(
new THREE.BoxGeometry(3,0.25,1),
new THREE.MeshStandardMaterial()
);
drone.add(body);

const arm1=new THREE.Mesh(
new THREE.BoxGeometry(5,0.1,0.2),
new THREE.MeshStandardMaterial()
);
drone.add(arm1);

const arm2=new THREE.Mesh(
new THREE.BoxGeometry(0.2,0.1,5),
new THREE.MeshStandardMaterial()
);
drone.add(arm2);

// Axis helper
drone.add(new THREE.AxesHelper(4));

function label(text,x,y,z,color){
 const canvas=document.createElement('canvas');
 canvas.width=256;canvas.height=128;
 const ctx=canvas.getContext('2d');
 ctx.fillStyle=color;
 ctx.font='48px Arial';
 ctx.fillText(text,20,70);
 const tex=new THREE.CanvasTexture(canvas);
 const spr=new THREE.Sprite(new THREE.SpriteMaterial({map:tex}));
 spr.position.set(x,y,z);
 spr.scale.set(1.5,.75,1);
 scene.add(spr);
}

label("X / ROLL",5,0,0,"red");
label("Y / PITCH",0,5,0,"lime");
label("Z / YAW",0,0,5,"cyan");

camera.lookAt(0,0,0);

document.getElementById("connect").onclick=async()=>{
 port=await navigator.serial.requestPort();
 await port.open({baudRate:115200});

 const decoder=new TextDecoderStream();
 port.readable.pipeTo(decoder.writable);
 reader=decoder.readable.getReader();

 let buf="";

 while(true){
  const {value,done}=await reader.read();
  if(done)break;

  buf+=value;
  const lines=buf.split("\n");
  buf=lines.pop();

  for(let line of lines){
   line=line.trim();

   if(line.startsWith("DATA,")){
     const p=line.split(",");

     tr=parseFloat(p[1]);
     tp=parseFloat(p[2]);
     ty=parseFloat(p[3]);

     roll.textContent=tr.toFixed(1);
     pitch.textContent=tp.toFixed(1);
     yaw.textContent=ty.toFixed(1);

     ax.textContent=p[4];
     ay.textContent=p[5];
     az.textContent=p[6];

     gx.textContent=p[7];
     gy.textContent=p[8];
     gz.textContent=p[9];
   }
  }
 }
}

function animate(){
 requestAnimationFrame(animate);

 cr+=(tr-cr)*0.15;
 cp+=(tp-cp)*0.15;
 cy+=(ty-cy)*0.15;

 drone.rotation.order="YXZ";
 drone.rotation.set(
  THREE.MathUtils.degToRad(cp),
  -THREE.MathUtils.degToRad(cy),
  THREE.MathUtils.degToRad(cr)
 );

 renderer.render(scene,camera);
}
animate();

window.addEventListener('resize',()=>{
 camera.aspect=window.innerWidth/window.innerHeight;
 camera.updateProjectionMatrix();
 renderer.setSize(window.innerWidth,window.innerHeight);
});
</script>
</body>
</html>
